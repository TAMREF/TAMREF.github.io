---
layout: default
---

<div class="posts">
  {% for post in site.posts %}
  {% if post.hidden != true %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>
        <span class="date">{{post.date | date: "%B %e, %Y   "}}<a href="{{ site.baseurl }}{{ post.url }}" class="read-more">(Read More...)</a></span>
    </article>
  {% endif %}
  {% endfor %}
</div>
