---
layout: default
---

<article class="pset">

  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>
<div class="Problem list">
    {%for post in site.tags[page.contest_name]%}
      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>
    {%endfor%}
</div>
  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>
</article>
