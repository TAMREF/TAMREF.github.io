---
layout: default
---

<article class="pset">

  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>
<div class="Problem list">
    Problems and Write-Up
    <ol start="A">
    {%for post in site.tags[page.contest_name]%}
    <li><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></li>
    {%endfor%}
    </ol>
</div>
  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>
</article>
