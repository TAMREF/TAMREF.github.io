---
layout: default
---

<article class="pset">

  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>
<div class="Problem list">
    <h2>Problems and Write-Up</h2>
    <hr class = "custom"/>
    <ul>
    {%for post in {{site.tags[page.contest_name] | sort }} %}
        <li><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></li>
    {%endfor%}
    </ul>
</div>
  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>
</article>
