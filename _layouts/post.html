---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>
    <div>
      <br>
    {% if page.tags != empty %}
      [{% for tag in page.tags %}
          <a href="/tags/archives#{{ tag | escape }}">{{tag}}</a>
          {% if forloop.index != page.tags.size %},{% endif %} 
        {% endfor %}]
    {% endif %}
      <br>
    </div>
  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
